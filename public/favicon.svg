<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000814;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001d3d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#B200FF;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark space background -->
  <rect width="64" height="64" fill="url(#bgGradient)"/>

  <!-- Stars -->
  <circle cx="8" cy="8" r="1" fill="#00F0FF" opacity="0.8"/>
  <circle cx="56" cy="12" r="1.2" fill="#B200FF" opacity="0.7"/>
  <circle cx="12" cy="56" r="0.8" fill="#00F0FF" opacity="0.9"/>
  <circle cx="48" cy="54" r="1" fill="#B200FF" opacity="0.6"/>
  <circle cx="60" cy="40" r="0.6" fill="#00F0FF" opacity="0.8"/>
  <circle cx="4" cy="40" r="1.1" fill="#B200FF" opacity="0.7"/>
  <circle cx="32" cy="10" r="0.7" fill="#00F0FF" opacity="0.8"/>
  <circle cx="52" cy="28" r="0.9" fill="#B200FF" opacity="0.6"/>

  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5"/>

  <!-- Inner cosmic circle with gradient -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#glowGradient)" stroke-width="2" filter="url(#glow)"/>

  <!-- "S" letter in cosmic style -->
  <g filter="url(#glow)">
    <!-- Top curve of S -->
    <path d="M 28 24 Q 24 24 24 28 Q 24 32 28 32" fill="none" stroke="#00F0FF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Middle -->
    <circle cx="32" cy="32" r="1.5" fill="#00F0FF" opacity="0.8"/>
    <!-- Bottom curve of S -->
    <path d="M 36 32 Q 40 32 40 36 Q 40 40 36 40" fill="none" stroke="#B200FF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Small cosmic particles -->
  <circle cx="20" cy="20" r="0.4" fill="#00F0FF" opacity="0.6"/>
  <circle cx="44" cy="44" r="0.5" fill="#B200FF" opacity="0.6"/>
  <circle cx="20" cy="44" r="0.3" fill="#00F0FF" opacity="0.7"/>
  <circle cx="44" cy="20" r="0.4" fill="#B200FF" opacity="0.7"/>
</svg>
